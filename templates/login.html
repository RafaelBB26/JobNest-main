<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/CSS/login.css">
</head>
<body>
<div class="loader-page-overlay" id="pageLoaderOverlay">
<img src="/static/multimedia/Logo.jpeg" alt="logo" class="loader-page-logo">
    <div class="loader-page-text">Cargando...</div>
</div>
<div id="customAlert" class="custom-alert-container">
    <div class="custom-alert-box">
        <p id="customAlertMessage"></p>
        <button id="customAlertClose" class="btn btn-primary">Aceptar</button>
    </div>
</div>
<div class="login-container">
    <div class="video-column">
    <img src="/static/multimedia/hero.jpg" alt="JobNest" class="imagen-fondo">
    </div>
    <div class="form-column col-12 col-md-6">
        <div class="top-bar">
            <a href="/templates/index.html" class="back-link"><i class="bi bi-arrow-left-circle-fill"></i> Regresar</a>
            <img src="/static/multimedia/Logo.jpeg" alt="logo" style="width: 60px;">
        </div>
        <div class="login-box">
            <h2>Iniciar sesión</h2>
            <form id="loginForm" novalidate>
                <div class="mb-3 text-start">
                    <input type="email" class="form-control" id="emailInput" placeholder="Correo electrónico" required>
                    <div class="error-message" id="emailError"></div>
                </div>
                <div class="mb-3 text-start">
                    <input type="password" class="form-control" id="passwordInput" placeholder="Contraseña" required>
                    <div class="error-message" id="passwordError"></div>
                </div>
                <button type="submit" class="btn btn-primary">Ingresar</button>
                <p class="mt-4 text-muted">¿No tienes cuenta? <a href="/templates/registro.html">Regístrate aquí</a></p>
            </form>
        </div>
    </div>
</div>
<div class="loader-overlay" id="loaderOverlay"><div class="loader-icon"><i class="bi bi-briefcase-fill"></i></div><div class="loader-text">Verificando...</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>

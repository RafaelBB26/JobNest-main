<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - JobNest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="/static/multimedia/Logo.jpeg" type="image/x-icon"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/CSS/registro.css">
</head>
<body>

<div id="loader" class="loader-container">
    <div class="loader-content">
        <img src="/static/multimedia/Logo.jpeg" alt="cargando..." class="loader-logo">
        <p class="mt-3">Registrando...</p>
    </div>
</div>

<div id="customAlert" class="custom-alert-container">
    <div class="custom-alert-box">
        <p id="customAlertMessage"></p>
        <button id="customAlertClose" class="btn btn-primary">aceptar</button>
    </div>
</div>

<div class="register-container">
    <div class="video-column">
    <img src="/static/multimedia/hero.jpg" alt="JobNest" class="imagen-fondo">
    </div>

    <div class="form-column">
        <div class="top-bar">
            <a href="/templates/index.html" class="back-link">
                <i class="bi bi-arrow-left-circle-fill"></i> Regresar
            </a>
            <img src="/static/multimedia/Logo.jpeg" alt="logo" style="width: 60px; height: auto;">
        </div>

        <div class="register-box">
            <h2>Registrarse</h2>

            <div class="user-type-selection mb-4">
                <p class="text-center mb-3">¿Qué tipo de cuenta deseas crear?</p>
                <div class="user-type-options">
                    <div class="type-option" data-type="prestador">
                        <i class="bi bi-briefcase-fill"></i>
                        <span>Prestador de servicios</span>
                    </div>
                    <div class="type-option" data-type="cliente">
                        <i class="bi bi-person-badge"></i>
                        <span>Cliente</span>
                    </div>
                </div>
            </div>

            <form id="registerForm" novalidate style="display: none;">
                <input type="hidden" name="userType" id="selectedUserType" value="">

                <div class="mb-3 text-start">
                    <input type="text" class="form-control" id="firstNameInput" name="firstName" placeholder="Nombre(s)" maxlength="50" required>
                    <div class="error-message" id="firstNameError"></div>
                </div>
                <div class="mb-3 text-start">
                    <input type="text" class="form-control" id="lastNamePInput" name="lastNameP" placeholder="Primer Apellido" maxlength="50" required>
                    <div class="error-message" id="lastNamePError"></div>
                </div>
                <div class="mb-3 text-start">
                    <input type="text" class="form-control" id="lastNameMInput" name="lastNameM" placeholder="Segundo Apellido" maxlength="50" required>
                    <div class="error-message" id="lastNameMError"></div>
                </div>
                <div class="mb-3 text-start">
                    <input type="tel" class="form-control" id="candidatePhoneInput" name="candidatePhone" placeholder="Número de teléfono (opcional)" maxlength="20">
                    <div class="error-message" id="candidatePhoneError"></div>
                </div>
                <div class="mb-3 text-start">
                    <input type="email" class="form-control" id="emailInput" name="email" placeholder="Correo electrónico" required>
                    <div class="error-message" id="emailError"></div>
                </div>
                <div class="mb-3 text-start">
                    <div class="input-group">
                        <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Contraseña" required>
                        <button class="btn btn-outline-secondary toggle-password" type="button">
                            <i class="bi bi-eye-fill"></i>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>
                <div class="mb-3 text-start">
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirmPasswordInput" name="confirmPassword" placeholder="Confirmar contraseña" required>
                        <button class="btn btn-outline-secondary toggle-password" type="button">
                            <i class="bi bi-eye-fill"></i>
                        </button>
                    </div>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>
                <div class="mb-3 form-check text-start">
                    <input type="checkbox" class="form-check-input" id="termsCheck" required>
                    <label class="form-check-label text-muted" for="termsCheck">Acepto los <a href="#" class="text-primary">términos y condiciones</a></label>
                    <div class="error-message" id="termsError"></div>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse</button>
                <p class="mt-4 text-muted">¿Ya tienes una cuenta? <a href="/templates/login.html">Inicia sesión aquí</a></p>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/registro.js"></script>
</body>
</html>
